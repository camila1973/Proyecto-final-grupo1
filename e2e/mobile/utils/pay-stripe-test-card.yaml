# Precondition: on /booking/checkout with guest info already filled and the
#               Pay button (testID="btn-pay") visible.
# Postcondition: Stripe test card submitted; confirmation screen rendering
#                (caller asserts confirmation-booking-id).
#
# The Stripe PaymentSheet is a native modal rendered by the Stripe SDK, NOT a
# React Native view tree, so testIDs do not propagate to its fields. We match
# by visible text. Card-field taps are wrapped with `optional: true` because the
# SDK may pre-focus a field and re-tapping would dismiss the keyboard.
appId: com.travelhub.mobile
---
- tapOn:
    id: "btn-pay"

# Stripe sheet animates in — give it a moment to mount native views.
- waitForAnimationToEnd:
    timeout: 8000

# Newer Stripe PaymentSheet variants open on a payment-method selector
# (Link / Card / Cash App Pay / Amazon Pay rows) instead of the card form.
# We detect that screen by the presence of "Cash App Pay" — unique to the
# selector — and tap "Card" to expand the card form. When the sheet opens
# directly on the card form, this runFlow is a no-op.
- runFlow:
    when:
      visible:
        text: "Cash App Pay"
    commands:
      - tapOn:
          text: "Card"
      - waitForAnimationToEnd:
          timeout: 3000

# Card number
- tapOn:
    text: "Card number"
    optional: true
- inputText: "4242424242424242"

# Expiry — label varies between "MM / YY" and "Expiry".
- tapOn:
    text: "MM / YY"
    optional: true
- tapOn:
    text: "Expiry"
    optional: true
- inputText: "1230"

# CVC
- tapOn:
    text: "CVC"
    optional: true
- inputText: "123"

# Postal / ZIP is only shown for some country/card combos (e.g. United States
# in the Stripe test sheet renders "ZIP Code"). We do NOT type unconditionally:
# when the field is absent, `inputText` would append to whichever input is
# still focused (typically CVC) and silently corrupt it. The regex is
# unanchored on both sides because Maestro matches `text:` as a full-string
# regex — "ZIP Code" must be caught by ".*ZIP.*", not by "ZIP".
- runFlow:
    when:
      visible:
        text: ".*ZIP.*|.*Postal.*"
    commands:
      - tapOn:
          text: ".*ZIP.*|.*Postal.*"
      - inputText: "12345"

# Dismiss the native keyboard so the Pay button is reachable. We tap a
# non-interactive label inside the sheet rather than using `hideKeyboard`:
# Maestro's hideKeyboard fails inside Stripe's iOS PaymentSheet ("Couldn't
# hide the keyboard. This can happen if the app uses a custom input or
# doesn't expose a standard dismiss action.") because the sheet manages its
# own input lifecycle. "Billing address" and "Card information" are static
# headers present in both platforms' sheets, so tapping them removes focus
# from the last text input. `optional: true` makes both taps no-ops when
# the keyboard isn't showing or the header isn't on screen.
- tapOn:
    text: "Billing address"
    optional: true
- tapOn:
    text: "Card information"
    optional: true

# Stripe's submit button exposes different identifiers on each platform:
#   Android: resource-id `com.travelhub.mobile:id/primary_button`. Both
#            `text` and `content-desc` are empty because the Compose button
#            merges its descendants' semantics, so the visible "Pay $X"
#            label never reaches the accessibility tree. Confirmed via
#            `adb shell uiautomator dump`.
#   iOS:     no resource-id, but `accessibilityText` carries "Pay $X"
#            literally. Confirmed via `maestro hierarchy`.
# We branch by platform to use the right selector in each case.
- runFlow:
    when:
      platform: Android
    commands:
      - extendedWaitUntil:
          visible:
            id: "primary_button"
          timeout: 10000
      - tapOn:
          id: "primary_button"
- runFlow:
    when:
      platform: iOS
    commands:
      - extendedWaitUntil:
          visible:
            text: "Pay.*\\$.*"
          timeout: 10000
      - tapOn:
          text: "Pay.*\\$.*"

# We don't wait here — the confirmation screen does its own polling
# (usePaymentPolling: 60 s max). Callers should follow this flow with an
# extendedWaitUntil on confirmation-booking-id, timed to allow the poll loop
# to finish.
