# E2E scenario 5 — Finalizar reservación.
# Flow: launch app cold → login → search → pick room → on /booking/checkout
#       the reservation is created (status=held) → back out without paying →
#       open Trips tab → tap "Complete Payment" on the held banner →
#       /booking/checkout (intent rebuilt via resumeHeld) → fill guest info →
#       pay → assert confirmation id.
---
appId: com.travelhub.mobile
env:
  TEST_EMAIL: "e2e@travelhub.com"
  FIRST_NAME: "Test"
  LAST_NAME: "Booking"
---
- runScript: "../utils/generate-future-dates.js"

- launchApp:
    clearState: true

- assertVisible:
    id: "input-city"

- runFlow: "../utils/login-as-e2e.yaml"

- runFlow:
    file: "../utils/search-and-pick-room.yaml"
    env:
      CHECK_IN: ${output.CHECK_IN}
      CHECK_OUT: ${output.CHECK_OUT}

# btn-pay appearing proves the reservation was successfully created with
# status=held (see checkout.tsx — pay button stays disabled until the
# /reservations POST returns).
- extendedWaitUntil:
    visible:
      id: "btn-pay"
    timeout: 15000

# Leave without paying — reservation stays in 'held' state, picked up by the
# Trips screen's HeldBanner on next focus.
- back

# Navigate to Trips tab. Use the deep link so we don't depend on tab-bar
# localization strings; the Trips screen routes to /(tabs)/trips.
- openLink: travelhub:///trips

- extendedWaitUntil:
    visible:
      id: "btn-complete-payment-banner"
    timeout: 10000

- tapOn:
    id: "btn-complete-payment-banner"

- extendedWaitUntil:
    visible:
      id: "btn-pay"
    timeout: 15000

# Guest info. Tap "guest-title" between fields to dismiss the Paper keyboard
# (hideKeyboard does not work on react-native-paper TextInputs — see
# .claude/commands/e2e.md).
- tapOn:
    id: "input-guest-firstName"
- inputText: ${FIRST_NAME}
- tapOn:
    id: "guest-title"

- tapOn:
    id: "input-guest-lastName"
- inputText: ${LAST_NAME}
- tapOn:
    id: "guest-title"

# Email is pre-filled from user.email (checkout.tsx — useState(user?.email)).
# Clear it before typing so we don't append to the pre-filled value.
- tapOn:
    id: "input-guest-email"
- eraseText: 50
- inputText: ${TEST_EMAIL}
- tapOn:
    id: "guest-title"

- tapOn:
    id: "input-guest-phone"
- inputText: "5551234567"
- tapOn:
    id: "guest-title"

- runFlow: "../utils/pay-stripe-test-card.yaml"

- extendedWaitUntil:
    visible:
      id: "confirmation-booking-id"
    # 25 s — usePaymentPolling caps at 20 s; allow a small buffer for the
    # confirmation screen to render after the polling resolves.
    timeout: 25000
