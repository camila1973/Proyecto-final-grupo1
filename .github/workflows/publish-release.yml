name: Publish Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.0)'
        required: true
        type: string

concurrency:
  group: publish-release
  cancel-in-progress: false

permissions:
  contents: write  # needed to create tags and releases

env:
  NX_DAEMON: 'false'
  NX_TUI: 'false'
  HUSKY: '0'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # ── 1. Validate input & run tests ─────────────────────────────────────────────
  validate:
    name: Validate & test
    runs-on: ubuntu-latest
    steps:
      - name: Validate version format
        run: |
          if ! echo "${{ github.event.inputs.version }}" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Version must follow semver format: v1.2.3"
            exit 1
          fi

      - name: Validate env (GATEWAY_URL + STRIPE_PUBLISHABLE_KEY)
        env:
          EXPO_PUBLIC_API_URL: ${{ vars.GATEWAY_URL }}
          EXPO_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
        run: |
          if [ -z "$EXPO_PUBLIC_API_URL" ]; then
            echo "::error::EXPO_PUBLIC_API_URL is empty. Set the GATEWAY_URL repository variable."
            exit 1
          fi
          if [ -z "$EXPO_PUBLIC_STRIPE_PUBLISHABLE_KEY" ]; then
            echo "::error::STRIPE_PUBLISHABLE_KEY secret is empty. Set it in the repo secrets."
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: ./.github/actions/setup

      - name: Run mobile tests
        run: pnpm exec nx test mobile --passWithNoTests --outputStyle=static

  # ── 2. Tag the commit ─────────────────────────────────────────────────────────
  tag:
    name: Tag commit
    needs: validate
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.tag.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Create and push tag
        id: tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          TAG="${{ github.event.inputs.version }}"
          SHA=$(git rev-parse HEAD)

          git tag -a "$TAG" "$SHA" -m "Release $TAG"
          git push origin "$TAG"

          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "Tagged $SHA as $TAG"

  # ── 3a. Build — Android ───────────────────────────────────────────────────────
  build-gh-android:
    name: Build / Android
    needs: tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.tag.outputs.sha }}

      - uses: ./.github/actions/setup

      - name: Set app version in app.json
        run: |
          VERSION="${{ github.event.inputs.version }}"
          SEMVER="${VERSION#v}"
          node -e "
            const fs = require('fs');
            const cfg = JSON.parse(fs.readFileSync('mobile/app.json', 'utf8'));
            cfg.expo.version = '$SEMVER';
            cfg.expo.android = cfg.expo.android ?? {};
            cfg.expo.android.versionCode = parseInt('$SEMVER'.replace(/\./g, ''));
            fs.writeFileSync('mobile/app.json', JSON.stringify(cfg, null, 2));
          "

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Expo + EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android (local)
        working-directory: mobile
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          EXPO_PUBLIC_API_URL: ${{ vars.GATEWAY_URL }}
          # StripeProvider in mobile/app/_layout.tsx throws on an empty key
          # and cascades into a render error before the app can boot.
          EXPO_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
        run: |
          mkdir -p ../artifacts
          eas build \
            --platform android \
            --profile preview \
            --non-interactive \
            --local \
            --output "../artifacts/travelhub-${{ github.event.inputs.version }}.apk"

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: travelhub-builds-android
          path: "artifacts/travelhub-${{ github.event.inputs.version }}.apk"

          if-no-files-found: error

  # ── 3b. Build — iOS ───────────────────────────────────────────────────────────
  build-gh-ios:
    name: Build / iOS
    needs: tag
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.tag.outputs.sha }}

      # Expo SDK 55 / expo-modules-core 55 ships Swift 6.2 syntax
      # (@MainActor on protocol conformance — SE-0470). The runner's default
      # selection is Xcode 16.4 (Swift 6.0), which rejects it as
      # "unknown attribute 'MainActor'". Pin the latest stable Xcode so the
      # toolchain matches the source.
      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - uses: ./.github/actions/setup

      - name: Set app version in app.json
        run: |
          VERSION="${{ github.event.inputs.version }}"
          SEMVER="${VERSION#v}"
          node -e "
            const fs = require('fs');
            const cfg = JSON.parse(fs.readFileSync('mobile/app.json', 'utf8'));
            cfg.expo.version = '$SEMVER';
            cfg.expo.android = cfg.expo.android ?? {};
            cfg.expo.android.versionCode = parseInt('$SEMVER'.replace(/\./g, ''));
            fs.writeFileSync('mobile/app.json', JSON.stringify(cfg, null, 2));
          "

      - name: Setup Expo + EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build iOS (local)
        working-directory: mobile
        env:
          EXPO_PUBLIC_API_URL: ${{ vars.GATEWAY_URL }}
          EXPO_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
        run: |
          mkdir -p ../artifacts
          eas build \
            --platform ios \
            --profile preview \
            --non-interactive \
            --local \
            --output "../artifacts/travelhub-${{ github.event.inputs.version }}-ios-simulator.tar.gz"

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: travelhub-builds-ios
          path: "artifacts/travelhub-${{ github.event.inputs.version }}-ios-simulator.tar.gz"

          if-no-files-found: error

  # ── 4. Collect artifacts (fan-in) ─────────────────────────────────────────────
  collect:
    name: Collect artifacts
    needs: [tag, build-gh-android, build-gh-ios]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check at least one build succeeded
        run: |
          GH_A="${{ needs.build-gh-android.result }}"
          GH_I="${{ needs.build-gh-ios.result }}"
          if [[ "$GH_A" != "success" && "$GH_I" != "success" ]]; then
            echo "::error::No build job succeeded. Cannot create release."
            exit 1
          fi

      - name: Download build artifacts
        if: ${{ needs.build-gh-android.result == 'success' || needs.build-gh-ios.result == 'success' }}
        uses: actions/download-artifact@v4
        with:
          pattern: travelhub-builds-*
          path: artifacts/
          merge-multiple: true

      - name: Upload unified artifacts
        uses: actions/upload-artifact@v4
        with:
          name: travelhub-release-builds
          path: artifacts/

          if-no-files-found: error

  # ── 5. Create GitHub Release ──────────────────────────────────────────────────
  release:
    name: Create release
    needs: [tag, collect]
    if: needs.collect.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.tag.outputs.sha }}
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: travelhub-release-builds
          path: artifacts/

      - name: Generate changelog
        id: changelog
        run: |
          TAG="${{ github.event.inputs.version }}"
          PREVIOUS_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sed -n '2p')

          if [ -n "$PREVIOUS_TAG" ]; then
            COMMITS=$(git log "$PREVIOUS_TAG"..HEAD --pretty=format:"- %s (%h)" -- mobile/ services/ 2>/dev/null || echo "")
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" --max-count=20 -- mobile/ services/ 2>/dev/null || echo "")
          fi

          {
            echo "body<<EOF"
            echo "## TravelHub $TAG"
            echo ""
            echo "### Changes"
            if [ -n "$COMMITS" ]; then
              echo "$COMMITS"
            else
              echo "- Initial release"
            fi
            echo ""
            echo "### Web"
            echo "Accede al frontend de producción en: https://storage.googleapis.com/travelhub-frontend-travelhub-cbayona-prod/index.html"
            echo ""
            echo "### Instalación en emuladores"
            echo ""
            echo "#### Android APK"
            echo ""
            echo "1. **Instala Android Studio** — incluye el emulador de Android y \`adb\`"
            echo "2. **Crea un dispositivo virtual** — Android Studio → Device Manager → Create Device → selecciona un perfil de teléfono → elige una imagen del sistema (API 33+ recomendada) → Finish"
            echo "3. **Inicia el emulador** — haz clic en el botón de play en Device Manager, o:"
            echo "\`\`\`"
            echo "emulator -avd <nombre_de_tu_avd>"
            echo "\`\`\`"
            echo "4. **Verifica que adb detecta el dispositivo**"
            echo "\`\`\`"
            echo "adb devices"
            echo "\`\`\`"
            echo "5. **Desinstala la versión anterior** (solo si estás actualizando)"
            echo "\`\`\`"
            echo "adb uninstall com.travelhub.mobile"
            echo "\`\`\`"
            echo "6. **Instala el APK**"
            echo "\`\`\`"
            echo "adb install travelhub-$TAG.apk"
            echo "\`\`\`"
            echo ""
            echo "#### iOS Simulator"
            echo ""
            echo "1. **Instala Xcode** — desde la Mac App Store (solo macOS)"
            echo "2. **Instala las herramientas de línea de comandos de Xcode**"
            echo "\`\`\`"
            echo "xcode-select --install"
            echo "\`\`\`"
            echo "3. **Instala un runtime de simulador** — Xcode → Settings → Platforms → agrega iOS 17 o 18"
            echo "4. **Inicia un simulador**"
            echo "\`\`\`"
            echo "xcrun simctl boot \"iPhone 16\""
            echo "open -a Simulator"
            echo "\`\`\`"
            echo "5. **Verifica que el simulador está corriendo**"
            echo "\`\`\`"
            echo "xcrun simctl list devices | grep Booted"
            echo "\`\`\`"
            echo "6. **Extrae el archivo tar.gz**"
            echo "\`\`\`"
            echo "tar -xzf travelhub-$TAG-ios-simulator.tar.gz"
            echo "\`\`\`"
            echo "7. **Instala la app**"
            echo "\`\`\`"
            echo "xcrun simctl install booted mobile.app"
            echo "\`\`\`"
            echo "8. **Lanza la app**"
            echo "\`\`\`"
            echo "xcrun simctl launch booted com.travelhub.mobile"
            echo "\`\`\`"
            echo ""
            echo "### Solución de problemas"
            echo ""
            echo "**Android: error de firma incompatible**"
            echo "Si \`adb install\` falla con \`INSTALL_FAILED_UPDATE_INCOMPATIBLE\`, hay una versión anterior firmada con una clave diferente. Desinstálala primero:"
            echo "\`\`\`"
            echo "adb uninstall com.travelhub.mobile"
            echo "adb install travelhub-$TAG.apk"
            echo "\`\`\`"
            echo ""
            echo "**iOS Simulator: la app no abre**"
            echo "Asegúrate de que el simulador esté iniciado antes de instalar:"
            echo "\`\`\`"
            echo "xcrun simctl boot \"iPhone 16\""
            echo "open -a Simulator"
            echo "\`\`\`"
            echo "Luego vuelve a ejecutar los comandos de instalación y lanzamiento."
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: TravelHub ${{ github.event.inputs.version }}
          body: ${{ steps.changelog.outputs.body }}
          files: artifacts/*
          draft: false
          prerelease: ${{ contains(github.event.inputs.version, '-') }}
