name: Publish Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.0)'
        required: true
        type: string

concurrency:
  group: publish-release
  cancel-in-progress: false

permissions:
  contents: write  # needed to create tags and releases

env:
  NX_DAEMON: 'false'
  NX_TUI: 'false'
  HUSKY: '0'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # ── 1. Validate input & run tests ─────────────────────────────────────────────
  validate:
    name: Validate & test
    runs-on: ubuntu-latest
    steps:
      - name: Validate version format
        run: |
          if ! echo "${{ github.event.inputs.version }}" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Version must follow semver format: v1.2.3"
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: ./.github/actions/setup

      - name: Run mobile tests
        run: pnpm exec nx test mobile --passWithNoTests --outputStyle=static

  # ── 2. Tag the commit ─────────────────────────────────────────────────────────
  tag:
    name: Tag commit
    needs: validate
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.tag.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Create and push tag
        id: tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          TAG="${{ github.event.inputs.version }}"
          SHA=$(git rev-parse HEAD)

          git tag -a "$TAG" "$SHA" -m "Release $TAG"
          git push origin "$TAG"

          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "Tagged $SHA as $TAG"

  # ── 3. Build with EAS (Android APK + iOS Simulator) ───────────────────────────
  build:
    name: Build (EAS)
    needs: tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.tag.outputs.sha }}

      - uses: ./.github/actions/setup

      - name: Set app version in app.json
        run: |
          VERSION="${{ github.event.inputs.version }}"
          SEMVER="${VERSION#v}"
          node -e "
            const fs = require('fs');
            const cfg = JSON.parse(fs.readFileSync('mobile/app.json', 'utf8'));
            cfg.expo.version = '$SEMVER';
            cfg.expo.android = cfg.expo.android ?? {};
            cfg.expo.android.versionCode = parseInt('$SEMVER'.replace(/\./g, ''));
            fs.writeFileSync('mobile/app.json', JSON.stringify(cfg, null, 2));
          "

      - name: Inject production API URL into eas.json
        env:
          EXPO_PUBLIC_API_URL: ${{ secrets.EXPO_PUBLIC_API_URL }}
        run: |
          node -e "
            const fs = require('fs');
            const eas = JSON.parse(fs.readFileSync('mobile/eas.json', 'utf8'));
            eas.build.preview.env.EXPO_PUBLIC_API_URL = process.env.EXPO_PUBLIC_API_URL;
            fs.writeFileSync('mobile/eas.json', JSON.stringify(eas, null, 2));
          "

      - name: Setup Expo + EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build with EAS (Android + iOS)
        working-directory: mobile
        run: |
          eas build \
            --platform all \
            --profile preview \
            --non-interactive \
            --json \
            --wait \
            > eas-output.json

      - name: Download artifacts from EAS
        run: |
          mkdir -p artifacts

          ANDROID_URL=$(jq -r '.[] | select(.platform == "ANDROID") | .artifacts.buildUrl' mobile/eas-output.json)
          IOS_URL=$(jq -r '.[] | select(.platform == "IOS") | .artifacts.buildUrl' mobile/eas-output.json)

          [ -n "$ANDROID_URL" ] && curl -fsSL -o "artifacts/travelhub-${{ github.event.inputs.version }}.apk" "$ANDROID_URL"
          [ -n "$IOS_URL" ]     && curl -fsSL -o "artifacts/travelhub-${{ github.event.inputs.version }}-ios-simulator.tar.gz" "$IOS_URL"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: travelhub-builds
          path: artifacts/
          retention-days: 7
          if-no-files-found: error

  # ── 4. Create GitHub Release ──────────────────────────────────────────────────
  release:
    name: Create release
    needs: [tag, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.tag.outputs.sha }}
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: travelhub-builds
          path: artifacts/

      - name: Generate changelog
        id: changelog
        run: |
          TAG="${{ github.event.inputs.version }}"
          PREVIOUS_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sed -n '2p')

          if [ -n "$PREVIOUS_TAG" ]; then
            COMMITS=$(git log "$PREVIOUS_TAG"..HEAD --pretty=format:"- %s (%h)" -- mobile/ services/ 2>/dev/null || echo "")
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" --max-count=20 -- mobile/ services/ 2>/dev/null || echo "")
          fi

          {
            echo "body<<EOF"
            echo "## TravelHub $TAG"
            echo ""
            echo "### Changes"
            if [ -n "$COMMITS" ]; then
              echo "$COMMITS"
            else
              echo "- Initial release"
            fi
            echo ""
            echo "### Install"
            echo "**Android emulator:** download \`travelhub-$TAG.apk\` and run:"
            echo "\`\`\`"
            echo "adb install travelhub-$TAG.apk"
            echo "\`\`\`"
            echo ""
            echo "**iOS Simulator:** download \`travelhub-$TAG-ios-simulator.tar.gz\`, extract, then run:"
            echo "\`\`\`"
            echo "xcrun simctl install booted mobile.app"
            echo "xcrun simctl launch booted com.travelhub.mobile"
            echo "\`\`\`"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: TravelHub ${{ github.event.inputs.version }}
          body: ${{ steps.changelog.outputs.body }}
          files: artifacts/*
          draft: false
          prerelease: ${{ contains(github.event.inputs.version, '-') }}
