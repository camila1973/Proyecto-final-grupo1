name: Mobile Build

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Target platform'
        required: true
        type: choice
        default: android
        options:
          - android
          - ios
          - all

concurrency:
  group: mobile-build-${{ github.event.inputs.platform }}-${{ github.ref }}
  cancel-in-progress: false

env:
  NX_DAEMON: 'false'
  NX_TUI: 'false'
  HUSKY: '0'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  # ── Pre-flight: fail fast if required env is missing ──────────────────────────
  validate-env:
    name: Validate env
    runs-on: ubuntu-latest
    steps:
      - name: Check GATEWAY_URL and STRIPE_PUBLISHABLE_KEY
        env:
          EXPO_PUBLIC_API_URL: ${{ vars.GATEWAY_URL }}
          EXPO_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
        run: |
          if [ -z "$EXPO_PUBLIC_API_URL" ]; then
            echo "::error::EXPO_PUBLIC_API_URL is empty. Set the GATEWAY_URL repository variable."
            exit 1
          fi
          if [ -z "$EXPO_PUBLIC_STRIPE_PUBLISHABLE_KEY" ]; then
            echo "::error::STRIPE_PUBLISHABLE_KEY secret is empty. Set it in the repo secrets."
            exit 1
          fi

  # ── Android (ubuntu-latest) ───────────────────────────────────────────────────
  build-gh-android:
    if: ${{ github.event.inputs.platform != 'ios' }}
    name: Android
    needs: validate-env
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup (pnpm + Node + deps)
        uses: ./.github/actions/setup

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Expo + EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android (local)
        working-directory: mobile
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          EXPO_PUBLIC_API_URL: ${{ vars.GATEWAY_URL }}
          # StripeProvider in mobile/app/_layout.tsx throws on an empty key
          # and cascades into a render error before the app can boot.
          EXPO_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
        run: |
          mkdir -p ../artifacts
          eas build \
            --platform android \
            --profile preview \
            --non-interactive \
            --local \
            --output ../artifacts/app.apk

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: mobile-preview-android-${{ github.run_id }}
          path: artifacts/app.apk
          retention-days: 1
          if-no-files-found: error

  # ── iOS (macos-latest) ────────────────────────────────────────────────────────
  build-gh-ios:
    if: ${{ github.event.inputs.platform != 'android' }}
    name: iOS
    needs: validate-env
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup (pnpm + Node + deps)
        uses: ./.github/actions/setup

      - name: Setup Expo + EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build iOS (local)
        working-directory: mobile
        env:
          EXPO_PUBLIC_API_URL: ${{ vars.GATEWAY_URL }}
          EXPO_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
        run: |
          mkdir -p ../artifacts
          eas build \
            --platform ios \
            --profile preview \
            --non-interactive \
            --local \
            --output ../artifacts/app.tar.gz

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: mobile-preview-ios-${{ github.run_id }}
          path: artifacts/app.tar.gz
          retention-days: 1
          if-no-files-found: error

