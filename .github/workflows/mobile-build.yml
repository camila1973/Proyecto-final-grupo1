name: Mobile Build

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Target platform'
        required: true
        type: choice
        default: android
        options:
          - android
          - ios
          - all

concurrency:
  group: mobile-build-${{ github.event.inputs.platform }}-${{ github.ref }}
  cancel-in-progress: false

env:
  NX_DAEMON: 'false'
  NX_TUI: 'false'
  HUSKY: '0'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-android:
    if: ${{ github.event.inputs.platform == 'android' || github.event.inputs.platform == 'all' }}
    name: EAS Local Build / Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup (pnpm + Node + deps)
        uses: ./.github/actions/setup

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Expo + EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android (local)
        working-directory: mobile
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
        run: |
          eas build \
            --platform android \
            --profile preview \
            --non-interactive \
            --local \
            --output ../artifacts/app.apk

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-preview-${{ github.run_id }}
          path: artifacts/app.apk
          retention-days: 30
          if-no-files-found: error

  build-ios:
    if: ${{ github.event.inputs.platform == 'ios' || github.event.inputs.platform == 'all' }}
    name: EAS Local Build / iOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup (pnpm + Node + deps)
        uses: ./.github/actions/setup

      - name: Setup Expo + EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install CocoaPods dependencies
        working-directory: mobile
        run: npx expo install --check 2>/dev/null || true

      - name: Build iOS (local)
        working-directory: mobile
        run: |
          eas build \
            --platform ios \
            --profile preview \
            --non-interactive \
            --local \
            --output ../artifacts/app.tar.gz

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-preview-${{ github.run_id }}
          path: artifacts/app.tar.gz
          retention-days: 30
          if-no-files-found: error
