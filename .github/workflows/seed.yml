name: Seed Databases

on:
  workflow_dispatch:

concurrency:
  group: seed-production
  cancel-in-progress: false

permissions:
  contents: read

env:
  NX_DAEMON: 'false'
  NX_TUI: 'false'
  HUSKY: '0'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  PULUMI_STACK: prod

jobs:
  seed:
    name: Migrate and seed production databases
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup

      - name: Install Pulumi dependencies
        run: npm install
        working-directory: pulumi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # Read the Cloud SQL connection name and DB password from the Pulumi stack
      - name: Read stack outputs
        id: stack
        run: |
          get() {
            PULUMI_CONFIG_PASSPHRASE="${{ secrets.PULUMI_CONFIG_PASSPHRASE }}" \
              pulumi stack output "$1" --stack $PULUMI_STACK --cwd pulumi
          }
          get_secret() {
            PULUMI_CONFIG_PASSPHRASE="${{ secrets.PULUMI_CONFIG_PASSPHRASE }}" \
              pulumi stack output "$1" --show-secrets --stack $PULUMI_STACK --cwd pulumi
          }
          echo "connection_name=$(get dbConnectionName)" >> $GITHUB_OUTPUT

          DB_PASS=$(get_secret dbPasswordSecret)
          echo "::add-mask::$DB_PASS"
          echo "db_pass=$DB_PASS" >> $GITHUB_OUTPUT
        env:
          PULUMI_CONFIG_PASSPHRASE: ${{ secrets.PULUMI_CONFIG_PASSPHRASE }}

      # Download and start Cloud SQL Auth Proxy so we can connect to Cloud SQL
      # from this CI runner via localhost:5432
      - name: Start Cloud SQL Auth Proxy
        run: |
          curl -sSL -o cloud-sql-proxy \
            https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.13.0/cloud-sql-proxy.linux.amd64
          chmod +x cloud-sql-proxy
          ./cloud-sql-proxy "${{ steps.stack.outputs.connection_name }}" \
            --port 5432 --quiet &
          # Give the proxy a moment to establish the connection
          sleep 3

      # Run migrations for every service that has a database.
      # DATABASE_URL points to localhost via the proxy above.
      - name: Run migrations
        run: |
          BASE="postgres://travelhub:${{ steps.stack.outputs.db_pass }}@localhost:5432"

          DATABASE_URL="${BASE}/search"              pnpm exec nx run search-service:migrate
          DATABASE_URL="${BASE}/inventory"           pnpm exec nx run inventory-service:migrate
          DATABASE_URL="${BASE}/integration_service" pnpm exec nx run integration-service:migrate

      # Seed only the services that ship seed data
      - name: Run seeds
        run: |
          BASE="postgres://travelhub:${{ steps.stack.outputs.db_pass }}@localhost:5432"

          DATABASE_URL="${BASE}/search"              pnpm exec nx run search-service:seed
          DATABASE_URL="${BASE}/inventory"           pnpm exec nx run inventory-service:seed
          DATABASE_URL="${BASE}/integration_service" pnpm exec nx run integration-service:seed
