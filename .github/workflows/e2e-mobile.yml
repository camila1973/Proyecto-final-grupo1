name: E2E Mobile (Maestro)

# Manual-only. Builds the Android APK pointed at the deployed gateway URL
# (default: production), boots an emulator on ubuntu-latest, installs Maestro,
# runs every flow under e2e/mobile/flows/, and uploads the HTML report and
# per-flow artifacts (screenshots / view hierarchies / video).
#
# Prerequisite: the bypass user (e2e@travelhub.com / E2eTest1234!) must already
# exist in the deployed auth-service DB with mfa_required=false. See the seed
# script in services/auth-service/scripts/.

on:
  workflow_dispatch:
    inputs:
      api_url:
        description: 'Gateway URL the mobile build will hit (leave blank to use the GATEWAY_URL repository variable).'
        required: false
        type: string

concurrency:
  group: e2e-mobile-${{ github.ref }}
  cancel-in-progress: false

env:
  NX_DAEMON: 'false'
  NX_TUI: 'false'
  HUSKY: '0'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  e2e-android:
    name: Android emulator + Maestro
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Setup (pnpm + Node + deps)
        uses: ./.github/actions/setup

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle (user-level)
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('mobile/android/**/*.gradle*', 'mobile/android/gradle/wrapper/gradle-wrapper.properties', 'mobile/package.json', 'pnpm-lock.yaml') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Setup Expo + EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Validate env (GATEWAY_URL + STRIPE_PUBLISHABLE_KEY)
        env:
          EXPO_PUBLIC_API_URL: ${{ github.event.inputs.api_url || vars.GATEWAY_URL }}
          EXPO_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
        run: |
          if [ -z "$EXPO_PUBLIC_API_URL" ]; then
            echo "::error::EXPO_PUBLIC_API_URL is empty. Set the GATEWAY_URL repository variable or pass the api_url workflow input."
            exit 1
          fi
          if [ -z "$EXPO_PUBLIC_STRIPE_PUBLISHABLE_KEY" ]; then
            echo "::error::STRIPE_PUBLISHABLE_KEY secret is empty. Set it in the repo secrets."
            exit 1
          fi
          echo "Building against: $EXPO_PUBLIC_API_URL"

      - name: Build Android APK pointed at deployed gateway
        working-directory: mobile
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          EXPO_PUBLIC_API_URL: ${{ github.event.inputs.api_url || vars.GATEWAY_URL }}
          # StripeProvider in mobile/app/_layout.tsx throws on an empty key,
          # which cascades into a "useAuth must be used inside AuthProvider"
          # render error and the app never reaches the login screen.
          EXPO_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
        run: |
          mkdir -p ../artifacts
          eas build \
            --platform android \
            --profile preview \
            --non-interactive \
            --local \
            --output ../artifacts/app.apk

      - name: Verify API URL is baked into the bundle
        env:
          EXPO_PUBLIC_API_URL: ${{ github.event.inputs.api_url || vars.GATEWAY_URL }}
        run: |
          if unzip -p artifacts/app.apk assets/index.android.bundle | strings | grep -qF "$EXPO_PUBLIC_API_URL"; then
            echo "API URL ($EXPO_PUBLIC_API_URL) found in bundle"
          else
            echo "::error::API URL ($EXPO_PUBLIC_API_URL) not found in bundle. Likely a cache or env-propagation issue."
            exit 1
          fi

      - name: Install Maestro CLI
        env:
          MAESTRO_VERSION: 2.5.1
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Enable KVM (required by Android emulator)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Maestro flows on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          script: |
            adb install -r artifacts/app.apk
            # Pequeña pausa para que el launcher (Pixel Launcher) termine de
            # estabilizarse tras el boot del emulador antes de lanzar la app
            # — evita la carrera con el ANR "Pixel Launcher isn't responding".
            sleep 5
            # Dismiss any pending system dialog (ANR/permission) que pudiera
            # estar en foreground; KEYCODE_BACK es no-op si no hay diálogo.
            adb shell input keyevent KEYCODE_BACK || true
            adb shell input keyevent KEYCODE_HOME || true
            pnpm run e2e:mobile:report

      - name: Upload Maestro HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-report-${{ github.run_id }}
          path: e2e/mobile/reports/
          retention-days: 14
          if-no-files-found: warn

      # `e2e/mobile/.artifacts/` empieza con punto, por lo que upload-artifact@v4
      # lo descarta por defecto (include-hidden-files: false). Lo habilitamos
      # explícitamente para que screenshots y commands JSON sí se publiquen.
      - name: Upload Maestro per-flow artifacts (screenshots / video / hierarchy)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-artifacts-${{ github.run_id }}
          path: e2e/mobile/.artifacts/
          retention-days: 7
          if-no-files-found: ignore
          include-hidden-files: true
