name: E2E Mobile (Maestro)

# Manual-only. Builds the Android APK pointed at the deployed gateway URL
# (default: production), boots an emulator on ubuntu-latest, installs Maestro,
# runs every flow under e2e/mobile/flows/, and uploads the HTML report and
# per-flow artifacts (screenshots / view hierarchies / video).
#
# Prerequisite: the bypass user (e2e@travelhub.com / E2eTest1234!) must already
# exist in the deployed auth-service DB with mfa_required=false. See the seed
# script in services/auth-service/scripts/.

on:
  workflow_dispatch:
    inputs:
      api_url:
        description: 'Gateway URL the mobile build will hit (leave blank to use the GATEWAY_URL repository variable).'
        required: false
        type: string

concurrency:
  group: e2e-mobile-${{ github.ref }}
  cancel-in-progress: false

env:
  NX_DAEMON: 'false'
  NX_TUI: 'false'
  HUSKY: '0'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  e2e-android:
    name: Android emulator + Maestro
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Setup (pnpm + Node + deps)
        uses: ./.github/actions/setup

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle (user-level)
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('mobile/android/**/*.gradle*', 'mobile/android/gradle/wrapper/gradle-wrapper.properties', 'mobile/package.json', 'pnpm-lock.yaml') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Setup Expo + EAS CLI
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Validate gateway URL
        env:
          EXPO_PUBLIC_API_URL: ${{ github.event.inputs.api_url || vars.GATEWAY_URL }}
        run: |
          if [ -z "$EXPO_PUBLIC_API_URL" ]; then
            echo "::error::EXPO_PUBLIC_API_URL is empty. Set the GATEWAY_URL repository variable or pass the api_url workflow input."
            exit 1
          fi
          echo "Building against: $EXPO_PUBLIC_API_URL"

      - name: Build Android APK pointed at deployed gateway
        working-directory: mobile
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          EXPO_PUBLIC_API_URL: ${{ github.event.inputs.api_url || vars.GATEWAY_URL }}
        run: |
          mkdir -p ../artifacts
          eas build \
            --platform android \
            --profile preview \
            --non-interactive \
            --local \
            --output ../artifacts/app.apk

      - name: Verify API URL is baked into the bundle
        env:
          EXPO_PUBLIC_API_URL: ${{ github.event.inputs.api_url || vars.GATEWAY_URL }}
        run: |
          if unzip -p artifacts/app.apk assets/index.android.bundle | strings | grep -qF "$EXPO_PUBLIC_API_URL"; then
            echo "API URL ($EXPO_PUBLIC_API_URL) found in bundle"
          else
            echo "::error::API URL ($EXPO_PUBLIC_API_URL) not found in bundle. Likely a cache or env-propagation issue."
            exit 1
          fi

      - name: Install Maestro CLI
        env:
          MAESTRO_VERSION: 2.5.1
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Enable KVM (required by Android emulator)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Maestro flows on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          script: |
            adb install -r artifacts/app.apk
            pnpm run e2e:mobile:report

      # TODO(revertir): paso de diagnóstico temporal. Una vez confirmemos dónde
      # Maestro está escribiendo screenshots/commands JSON en CI, eliminar este
      # paso y ajustar el upload-artifact correspondiente.
      - name: Diagnose Maestro output paths
        if: always()
        run: |
          echo "=== pwd ==="
          pwd
          echo "=== ls e2e/mobile/.artifacts ==="
          ls -laR e2e/mobile/.artifacts/ 2>&1 || echo "(missing)"
          echo "=== ls e2e/mobile/reports ==="
          ls -la e2e/mobile/reports/ 2>&1 || echo "(missing)"
          echo "=== find workspace for maestro artifacts ==="
          find "$GITHUB_WORKSPACE" \
            \( -name "screenshot-*.png" -o -name "commands-*.json" -o -name "maestro.log" -o -name "report.html" \) \
            2>/dev/null | head -200
          echo "=== ls ~/.maestro ==="
          ls -la "$HOME/.maestro" 2>&1 || echo "(missing)"
          echo "=== find ~/.maestro for artifacts ==="
          find "$HOME/.maestro" -type f \
            \( -name "screenshot-*.png" -o -name "commands-*.json" -o -name "maestro.log" \) \
            2>/dev/null | head -200

      - name: Upload Maestro HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-report-${{ github.run_id }}
          path: e2e/mobile/reports/
          retention-days: 14
          if-no-files-found: warn

      - name: Upload Maestro per-flow artifacts (screenshots / video / hierarchy)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-artifacts-${{ github.run_id }}
          path: e2e/mobile/.artifacts/
          retention-days: 7
          if-no-files-found: ignore
