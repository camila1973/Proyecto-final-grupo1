name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  affected:
    name: Affected Projects
    runs-on: ubuntu-latest

    env:
      NX_DAEMON: 'false'
      NX_TUI: 'false'
      HUSKY: '0'
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set Nx Base/Head
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "NX_BASE=origin/${{ github.base_ref }}" >> "$GITHUB_ENV"
            echo "NX_HEAD=${{ github.sha }}" >> "$GITHUB_ENV"
          else
            echo "NX_BASE=${{ github.event.before }}" >> "$GITHUB_ENV"
            echo "NX_HEAD=${{ github.sha }}" >> "$GITHUB_ENV"
          fi

      - name: Lint Affected
        run: npm exec -- nx affected -t lint --base="$NX_BASE" --head="$NX_HEAD" --outputStyle=static

      - name: Build Affected
        run: npm exec -- nx affected -t build --base="$NX_BASE" --head="$NX_HEAD" --outputStyle=static

      - name: Test Affected
        run: npm exec -- nx affected -t test --base="$NX_BASE" --head="$NX_HEAD" --outputStyle=static -- --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: coverage/
          flags: monorepo
          fail_ci_if_error: false
