name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    name: ${{ matrix.project }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: [api-gateway, auth-service, search-service, inventory-service, booking-service, payment-service, notification-service, partners-service, frontend, mobile]

    env:
      NX_DAEMON: 'false'
      NX_TUI: 'false'
      HUSKY: '0'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install dependencies
        run: npm ci --omit=optional

      - name: Lint ${{ matrix.project }}
        run: npm exec nx run ${{ matrix.project }}:lint

      - name: Build ${{ matrix.project }}
        run: npm exec nx run ${{ matrix.project }}:build

      - name: Test ${{ matrix.project }}
        run: npm exec nx run ${{ matrix.project }}:test
