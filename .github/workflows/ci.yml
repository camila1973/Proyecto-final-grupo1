name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

env:
  NX_DAEMON: 'false'
  NX_TUI: 'false'
  HUSKY: '0'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup
      - run: pnpm run typecheck

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup
      - name: Set Nx Base/Head
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "NX_BASE=origin/${{ github.base_ref }}" >> "$GITHUB_ENV"
            echo "NX_HEAD=${{ github.sha }}" >> "$GITHUB_ENV"
          else
            echo "NX_BASE=${{ github.event.before }}" >> "$GITHUB_ENV"
            echo "NX_HEAD=${{ github.sha }}" >> "$GITHUB_ENV"
          fi
      - run: pnpm exec nx affected -t lint --base="$NX_BASE" --head="$NX_HEAD" --outputStyle=static

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup
      - name: Set Nx Base/Head
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "NX_BASE=origin/${{ github.base_ref }}" >> "$GITHUB_ENV"
            echo "NX_HEAD=${{ github.sha }}" >> "$GITHUB_ENV"
          else
            echo "NX_BASE=${{ github.event.before }}" >> "$GITHUB_ENV"
            echo "NX_HEAD=${{ github.sha }}" >> "$GITHUB_ENV"
          fi
      - run: pnpm exec nx affected -t build --base="$NX_BASE" --head="$NX_HEAD" --outputStyle=static

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup
      - name: Set Nx Base/Head
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "NX_BASE=origin/${{ github.base_ref }}" >> "$GITHUB_ENV"
            echo "NX_HEAD=${{ github.sha }}" >> "$GITHUB_ENV"
          else
            echo "NX_BASE=${{ github.event.before }}" >> "$GITHUB_ENV"
            echo "NX_HEAD=${{ github.sha }}" >> "$GITHUB_ENV"
          fi
      - run: pnpm exec nx run-many -t test --outputStyle=static -- --coverage
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/**/lcov.info
          flags: monorepo
          fail_ci_if_error: false
