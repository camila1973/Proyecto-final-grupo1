x-service-build: &service-build
  context: .
  dockerfile: docker/Dockerfile.service

x-pg-healthcheck: &pg-healthcheck
  test: ["CMD-SHELL", "pg_isready -U postgres"]
  interval: 10s
  timeout: 5s
  retries: 5

networks:
  travelhub:
    driver: bridge

volumes:
  auth_pg_data:
  search_pg_data:
  inventory_pg_data:
  booking_pg_data:
  payment_pg_data:
  notification_pg_data:
  partners_pg_data:
  integration_pg_data:
  redis_data:
  rabbitmq_data:

services:
  # ─── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "4200:80"
    networks:
      - travelhub
    depends_on:
      - api-gateway

  # ─── API Gateway (no DB) ─────────────────────────────────────────────────────
  api-gateway:
    build:
      <<: *service-build
      args:
        SERVICE_NAME: api-gateway
        SERVICE_PORT: 3000
    ports:
      - "3000:3000"
    networks:
      - travelhub
    environment:
      NODE_ENV: production
      PORT: 3000
      AUTH_SERVICE_URL: http://auth-service:3001
      SEARCH_SERVICE_URL: http://search-service:3002
      INVENTORY_SERVICE_URL: http://inventory-service:3003
      BOOKING_SERVICE_URL: http://booking-service:3004
      PAYMENT_SERVICE_URL: http://payment-service:3005
      NOTIFICATION_SERVICE_URL: http://notification-service:3006
      PARTNERS_SERVICE_URL: http://partners-service:3007
    depends_on:
      - auth-service
      - search-service
      - inventory-service
      - booking-service
      - payment-service
      - notification-service
      - partners-service

  # ─── Auth Service ─────────────────────────────────────────────────────────────
  auth-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: travelhub
    ports:
      - "5432:5432"
    volumes:
      - auth_pg_data:/var/lib/postgresql/data
    networks:
      - travelhub
    healthcheck:
      <<: *pg-healthcheck

  auth-service:
    build:
      <<: *service-build
      args:
        SERVICE_NAME: auth-service
        SERVICE_PORT: 3001
    ports:
      - "3001:3001"
    networks:
      - travelhub
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgres://postgres:postgres@auth-db:5432/travelhub?sslmode=disable
      NOTIFICATION_SERVICE_URL: http://notification-service:3006
    depends_on:
      auth-db:
        condition: service_healthy

  # ─── Shared infrastructure (Redis + RabbitMQ) ────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - travelhub
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "15672:15672"   # management UI (optional, for local debugging)
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - travelhub
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ─── Search Service ───────────────────────────────────────────────────────────
  search-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: search_service
    ports:
      - "5433:5432"
    volumes:
      - search_pg_data:/var/lib/postgresql/data
    networks:
      - travelhub
    healthcheck:
      <<: *pg-healthcheck

  search-service:
    build:
      <<: *service-build
      args:
        SERVICE_NAME: search-service
        SERVICE_PORT: 3002
    ports:
      - "3002:3002"
    networks:
      - travelhub
    environment:
      NODE_ENV: production
      PORT: 3002
      DATABASE_URL: postgres://postgres:postgres@search-db:5432/search_service?sslmode=disable
      REDIS_URL: redis://redis:6379
      MESSAGE_BROKER_URL: amqp://guest:guest@rabbitmq:5672
      MESSAGE_BROKER_TYPE: rabbitmq
      INVENTORY_SERVICE_URL: http://inventory-service:3003
    depends_on:
      search-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      inventory-service:
        condition: service_started

  # ─── Inventory Service ────────────────────────────────────────────────────────
  inventory-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: travelhub
    ports:
      - "5434:5432"
    volumes:
      - inventory_pg_data:/var/lib/postgresql/data
    networks:
      - travelhub
    healthcheck:
      <<: *pg-healthcheck

  inventory-service:
    build:
      <<: *service-build
      args:
        SERVICE_NAME: inventory-service
        SERVICE_PORT: 3003
    ports:
      - "3003:3003"
    networks:
      - travelhub
    environment:
      NODE_ENV: production
      PORT: 3003
      DATABASE_URL: postgres://postgres:postgres@inventory-db:5432/travelhub?sslmode=disable
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
    depends_on:
      inventory-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ─── Booking Service ──────────────────────────────────────────────────────────
  booking-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: travelhub
    ports:
      - "5436:5432"
    volumes:
      - booking_pg_data:/var/lib/postgresql/data
    networks:
      - travelhub
    healthcheck:
      <<: *pg-healthcheck

  booking-service:
    build:
      <<: *service-build
      args:
        SERVICE_NAME: booking-service
        SERVICE_PORT: 3004
    ports:
      - "3004:3004"
    networks:
      - travelhub
    environment:
      NODE_ENV: production
      PORT: 3004
      DATABASE_URL: postgres://postgres:postgres@booking-db:5432/travelhub?sslmode=disable
      MESSAGE_BROKER_URL: amqp://guest:guest@rabbitmq:5672
      MESSAGE_BROKER_TYPE: rabbitmq
    depends_on:
      booking-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ─── Payment Service ──────────────────────────────────────────────────────────
  payment-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: travelhub
    ports:
      - "5437:5432"
    volumes:
      - payment_pg_data:/var/lib/postgresql/data
    networks:
      - travelhub
    healthcheck:
      <<: *pg-healthcheck

  payment-service:
    build:
      <<: *service-build
      args:
        SERVICE_NAME: payment-service
        SERVICE_PORT: 3005
    ports:
      - "3005:3005"
    networks:
      - travelhub
    environment:
      NODE_ENV: production
      PORT: 3005
      DATABASE_URL: postgres://postgres:postgres@payment-db:5432/travelhub
      BOOKING_SERVICE_URL: http://booking-service:3004
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-noreply@travelhub.com}
    depends_on:
      payment-db:
        condition: service_healthy
      booking-service:
        condition: service_started

  # ─── Notification Service ─────────────────────────────────────────────────────
  notification-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: travelhub
    volumes:
      - notification_pg_data:/var/lib/postgresql/data
    networks:
      - travelhub
    healthcheck:
      <<: *pg-healthcheck

  notification-service:
    build:
      <<: *service-build
      args:
        SERVICE_NAME: notification-service
        SERVICE_PORT: 3006
    ports:
      - "3006:3006"
    networks:
      - travelhub
    environment:
      NODE_ENV: production
      PORT: 3006
      DATABASE_URL: postgres://postgres:postgres@notification-db:5432/travelhub
    depends_on:
      notification-db:
        condition: service_healthy

  # ─── Partners Service ─────────────────────────────────────────────────────────
  partners-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: travelhub
    volumes:
      - partners_pg_data:/var/lib/postgresql/data
    networks:
      - travelhub
    healthcheck:
      <<: *pg-healthcheck

  partners-service:
    build:
      <<: *service-build
      args:
        SERVICE_NAME: partners-service
        SERVICE_PORT: 3007
    ports:
      - "3007:3007"
    networks:
      - travelhub
    environment:
      NODE_ENV: production
      PORT: 3007
      DATABASE_URL: postgres://postgres:postgres@partners-db:5432/travelhub
      BOOKING_SERVICE_URL: http://booking-service:3004
    depends_on:
      partners-db:
        condition: service_healthy
      booking-service:
        condition: service_started

  # ─── Integration Service ──────────────────────────────────────────────────────
  integration-db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: integration_service
    ports:
      - "5435:5432"
    volumes:
      - integration_pg_data:/var/lib/postgresql/data
    networks:
      - travelhub
    healthcheck:
      <<: *pg-healthcheck

  integration-service:
    build:
      <<: *service-build
      args:
        SERVICE_NAME: integration-service
        SERVICE_PORT: 3008
    ports:
      - "3008:3008"
    networks:
      - travelhub
    environment:
      NODE_ENV: production
      PORT: 3008
      DATABASE_URL: postgres://postgres:postgres@integration-db:5432/integration_service?sslmode=disable
      REDIS_HOST: redis
      REDIS_PORT: 6379
      INVENTORY_SERVICE_URL: http://inventory-service:3003
      BOOKING_SERVICE_URL: http://booking-service:3004
      PAYMENT_SERVICE_URL: http://payment-service:3005
      FX_MOCK: "true"
    depends_on:
      integration-db:
        condition: service_healthy
      redis:
        condition: service_healthy
