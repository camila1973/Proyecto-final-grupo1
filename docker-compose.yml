x-service-build: &service-build
  context: .
  dockerfile: docker/Dockerfile.service

x-pg-healthcheck: &pg-healthcheck
  test: ["CMD-SHELL", "pg_isready -U postgres"]
  interval: 10s
  timeout: 5s
  retries: 5

networks:
  travelhub:
    driver: bridge

volumes:
  auth_pg_data:
  search_pg_data:
  inventory_pg_data:
  booking_pg_data:
  payment_pg_data:
  notification_pg_data:
  partners_pg_data:

services:
  # ─── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "4200:80"
    networks:
      - travelhub
    depends_on:
      - api-gateway

  # ─── API Gateway (no DB) ─────────────────────────────────────────────────────
  api-gateway:
    build:
      <<: *service-build
      args:
        SERVICE_NAME: api-gateway
        SERVICE_PORT: 3000
    ports:
      - "3000:3000"
    networks:
      - travelhub
    environment:
      NODE_ENV: production
      PORT: 3000
      AUTH_SERVICE_URL: http://auth-service:3001
      SEARCH_SERVICE_URL: http://search-service:3002
      INVENTORY_SERVICE_URL: http://inventory-service:3003
      BOOKING_SERVICE_URL: http://booking-service:3004
      PAYMENT_SERVICE_URL: http://payment-service:3005
      NOTIFICATION_SERVICE_URL: http://notification-service:3006
      PARTNERS_SERVICE_URL: http://partners-service:3007
    depends_on:
      - auth-service
      - search-service
      - inventory-service
      - booking-service
      - payment-service
      - notification-service
      - partners-service

  # ─── Auth Service ─────────────────────────────────────────────────────────────
  auth-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: travelhub
    volumes:
      - auth_pg_data:/var/lib/postgresql/data
    networks:
      - travelhub
    healthcheck:
      <<: *pg-healthcheck

  auth-service:
    build:
      <<: *service-build
      args:
        SERVICE_NAME: auth-service
        SERVICE_PORT: 3001
    ports:
      - "3001:3001"
    networks:
      - travelhub
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgres://postgres:postgres@auth-db:5432/travelhub
    depends_on:
      auth-db:
        condition: service_healthy

  # ─── Search Service ───────────────────────────────────────────────────────────
  search-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: travelhub
    volumes:
      - search_pg_data:/var/lib/postgresql/data
    networks:
      - travelhub
    healthcheck:
      <<: *pg-healthcheck

  search-service:
    build:
      <<: *service-build
      args:
        SERVICE_NAME: search-service
        SERVICE_PORT: 3002
    ports:
      - "3002:3002"
    networks:
      - travelhub
    environment:
      NODE_ENV: production
      PORT: 3002
      DATABASE_URL: postgres://postgres:postgres@search-db:5432/travelhub
    depends_on:
      search-db:
        condition: service_healthy

  # ─── Inventory Service ────────────────────────────────────────────────────────
